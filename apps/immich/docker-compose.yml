
include:
  - ../global-network.yml

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.5.6
    container_name: ${SERVICE_NAME}-server
    environment:
      DB_HOSTNAME: ${SERVICE_NAME}-db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      REDIS_HOSTNAME: ${SERVICE_NAME}-redis
    extends:
      file: ../global-compose.yml
      service: base-quicksync
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
    networks:
      - immich-net
      - traefik-net
    depends_on:
      - redis
      - database
    labels:
      - traefik.enable=true

      # This is for home assistant for wall photoframe
      - traefik.http.middlewares.immich-cors.headers.accessControlAllowOriginList=https://ha.fikus.si
      - traefik.http.middlewares.immich-cors.headers.accessControlAllowMethods=GET, PUT, POST, DELETE, OPTIONS
      - traefik.http.middlewares.immich-cors.headers.accessControlAllowHeaders=X-Api-Key, User-Agent, Content-Type
      - traefik.http.middlewares.immich-cors.headers.accessControlMaxAge=1728000

      # Access with gatekeeper's whitelist, mostly for links sharing
      - traefik.http.routers.immich-main.rule=Host(`img.fikus.si`)
      - traefik.http.routers.immich-main.entrypoints=https,http
      - traefik.http.routers.immich-main.tls=true
      - traefik.http.routers.immich-main.tls.certresolver=fikus_resolver
      - traefik.http.routers.immich-main.middlewares=immich-cors,dynamic-whitelist@file

      # Access by mTLS
      - traefik.http.routers.immich-mtls.rule=Host(`im.fikus.si`)
      - traefik.http.routers.immich-mtls.entrypoints=https,http
      - traefik.http.routers.immich-mtls.tls=true
      - traefik.http.routers.immich-mtls.tls.certresolver=fikus_resolver
      - traefik.http.routers.immich-mtls.middlewares=immich-cors
      - traefik.http.routers.immich-mtls.tls.options=fikus_mtls@file

      # Gatekeeper whitelists IPs that access a valid share link
      - traefik.http.routers.immich-share.rule=Host(`img.fikus.si`) && PathRegexp(`^\/share\/(?:[A-Z,a-z,0-9,_,-]){67}$`)
      - traefik.http.routers.immich-share.entrypoints=https,http
      - traefik.http.routers.immich-share.middlewares=gatekeeper_immich_share@docker
      - traefik.http.routers.immich-share.tls=true
      - traefik.http.routers.immich-share.tls.certresolver=fikus_resolver
    healthcheck:
      disable: false


  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.5.6-cuda
    container_name: ${SERVICE_NAME}-machine-learning
    environment:
      MACHINE_LEARNING_MODEL_TTL: ${MACHINE_LEARNING_MODEL_TTL}
    extends:
      file: ../global-compose.yml
      service: base-cuda
    volumes:
      - ./ml-data/model-cache:/cache
      - ./ml-data/dotcache:/.cache
      - ./ml-data/config:/.config
    networks:
      - immich-net
    healthcheck:
      disable: false


  redis:    
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6  # renovate: disable
    container_name: ${SERVICE_NAME}-redis
    extends:
      file: ../global-compose.yml
      service: base
    volumes:
      - ./redis-data:/data
    networks:
      - immich-net
    healthcheck:
      test: redis-cli ping || exit 1


  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23  # renovate: disable
    container_name: ${SERVICE_NAME}-db
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    extends:
      file: ../global-compose.yml
      service: base
    volumes:
      - ./db-data:/var/lib/postgresql/data
    networks:
      - immich-net
    healthcheck:
      disable: false
    shm_size: 128mb



networks:
  immich-net:
