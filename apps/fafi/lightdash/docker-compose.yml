include:
  - ../../global-network.yml

services:
  minio-lightdash:
    image: coollabsio/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: ${SERVICE_NAME}-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_DEFAULT_BUCKETS: default
    extends:
      file: ../../global-compose.yml
      service: base
    volumes:
      - ./minio-data/init-minio.sh:/init-minio.sh
      - ./minio-data:/data
    #ports:
    #  - '9000:9000'
    #  - '9001:9001' # for minio console
    networks:
      - lightdash-net
    entrypoint: '/init-minio.sh'


  lightdash:
    image: lightdash/lightdash:0.2569.0
    container_name: ${SERVICE_NAME}-app
    environment:
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE}
      SECURE_COOKIES: ${SECURE_COOKIES}
      TRUST_PROXY: ${TRUST_PROXY}
      LIGHTDASH_SECRET: ${LIGHTDASH_SECRET}
      PORT: ${SERVICE_PORT}
      SITE_URL: https://${SERVICE_FQDN}
      LIGHTDASH_LOG_LEVEL: ${LIGHTDASH_LOG_LEVEL}
      LIGHTDASH_INSTALL_ID: ${LIGHTDASH_INSTALL_ID}
      LIGHTDASH_INSTALL_TYPE: ${LIGHTDASH_INSTALL_TYPE:-docker_image}
      LIGHTDASH_LICENSE_KEY: ${LIGHTDASH_LICENSE_KEY}
      ALLOW_MULTIPLE_ORGS: ${ALLOW_MULTIPLE_ORGS:-false}
      LIGHTDASH_QUERY_MAX_LIMIT: ${LIGHTDASH_QUERY_MAX_LIMIT}
      LIGHTDASH_MAX_PAYLOAD: ${LIGHTDASH_MAX_PAYLOAD:-5mb}
      HEADLESS_BROWSER_HOST: headless-browser
      HEADLESS_BROWSER_PORT: 3000
      USE_SECURE_BROWSER: ${USE_SECURE_BROWSER}
      SCHEDULER_ENABLED: true
      GROUPS_ENABLED: ${GROUPS_ENABLED:-false}
      SERVICE_ACCOUNT_ENABLED: ${SERVICE_ACCOUNT_ENABLED:-false}
    extends:
      file: ../../global-compose.yml
      service: web-base-internal
    volumes:
      - ./lightdash-data:/usr/app/dbt
    networks:
      - lightdash-net
      - fafi-net
    depends_on:
      - db-lightdash
      - minio-lightdash
    platform: linux/amd64
    user: ""  # the thing doesnt run without root
    healthcheck: # override base compose, image lacks wget or curl
      test: []


  db-lightdash:
    image: postgres:15.17
    container_name: ${SERVICE_NAME}-db
    environment:
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_USER: ${PGUSER}
      POSTGRES_DB: ${PGDATABASE}
    extends:
      file: ../../global-compose.yml
      service: base
    volumes:
      - ./db:/var/lib/postgresql/data
    networks:
      - lightdash-net


#    headless-browser:
#        build:
#            dockerfile: docker/Dockerfile.headless-browser
#        restart: always
#        ports:
#            - '3001:3000'


networks:
  lightdash-net: