include:
  - ../../global-network.yml

services:
  metabase:
    image: metabase/metabase:v0.58.x
    container_name: ${SERVICE_NAME}-app
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: ${SERVICE_NAME}-db
    extends:
      file: ../../global-compose.yml
      service: web-base-exposed
    volumes:
      - /dev/urandom:/dev/random:ro
    networks:
      - metabase-net
      - fafi-net
    depends_on:
      - metabase-db

      
  metabase-db:
    image: postgres:17.5-bullseye
    container_name: ${SERVICE_NAME}-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
    extends:
      file: ../../global-compose.yml
      service: base
    volumes:
      - ./db-data:/data/postgres
    networks:
      - metabase-net

networks:
  metabase-net: