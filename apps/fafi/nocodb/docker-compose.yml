include:
  - ../../global-network.yml

services:
  nocodb: 
    image: nocodb/nocodb:0.301.3
    container_name: ${SERVICE_NAME}-app
    environment: 
      NC_DB: pg://fafi_db:5432?u=${POSTGRES_USER}&p=${POSTGRES_PASSWORD}&d=${POSTGRES_DB}
      NC_PUBLIC_URL: https://${SERVICE_FQDN}
      NC_DISABLE_TELE: true
    extends:
      file: ../../global-compose.yml
      service: web-base-exposed
    networks: 
      - fafi-net
    volumes: 
      - ./app-data:/usr/app/data
    depends_on:
      - fafi_db


