  fafi_db:
    image: postgres:16.12
    container_name: fafi_db
    extends:
      file: ../../global-compose.yml
      service: base-postgres
    volumes:
       - ./db-data:/data/postgres
    ports:
      - ${INTERFACE_IP}:4432:5432
    networks: 
      - fafi-net
