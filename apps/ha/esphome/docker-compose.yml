include:
  - ../../global-network.yml

services:
  esphome:
    image: esphome/esphome:2026.2.4
    container_name: ${SERVICE_NAME}-app
    environment:
      USERNAME: ${USERNAME}
      PASSWORD: ${PASSWORD}
      ESPHOME_DASHBOARD_USE_PING: ${ESPHOME_DASHBOARD_USE_PING}
    extends:
      file: ../../global-compose.yml
      service: web-base-internal
    volumes:
      - ./app-data:/config
    networks:
      - ha-net
    user: ""  # fails if run as user: PermissionError: [Errno 13] Permission denied: '/.platformio'

